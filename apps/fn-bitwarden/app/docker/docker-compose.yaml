services:
  bitwarden:
    image: vaultwarden/server:latest
    container_name: fn-bitwarden
    environment:
      - DOMAIN=${DOMAIN}
      - WEB_VAULT_ENABLED=${WEB_VAULT_ENABLED}
    volumes:
      - ${TRIM_PKGVAR}/data:/data
    ports:
      - "${APP_PORT}:80"
    restart: always

volumes:
  bitwarden:
