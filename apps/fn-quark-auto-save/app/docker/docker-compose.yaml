      - ENABLED_PLUGINS=hunhepan,jikepan,panwiki,pansearch,panta,qupansou,hdr4k,pan666,susu,thepiratebay,wanou,xuexizhinan,panyq,zhizhen,labi,muou,ouge,shandian,duoduo,huban,cyg,erxiao,miaoso,fox4k,pianku,clmao,wuji,cldi,xiaozhang,libvio,leijing,xb6v,xys,ddys,hdmoli,yuhuage,u3c3,javdb,clxiong,jutoushe,sdso,xiaoji,xdyh,haisou,bixin,djgou,nyaa,xinjuc,aikanzy,qupanshe,xdpan,discourse,yunsou,qqpd,ahhhhfs,nsgame,gying,quark4k,quarksoo,sousou,ash,weibo,feikuai,kkmao,alupan,ypfxw,mikuclub,daishudj,dyyj,meitizy,jsnoteclub,mizixing,lou1,yiove,zxzj,qingying,kkv,yulinshufa
      - CACHE_ENABLED=${CACHE_ENABLED}
      - CACHE_PATH=/app/cache
      - CACHE_MAX_SIZE=${CACHE_MAX_SIZE}
      - CACHE_TTL=${CACHE_TTL}
      - ASYNC_PLUGIN_ENABLED=${ASYNC_PLUGIN_ENABLED}
      - ASYNC_RESPONSE_TIMEOUT=${ASYNC_RESPONSE_TIMEOUT}
      - ASYNC_MAX_BACKGROUND_WORKERS=${ASYNC_MAX_BACKGROUND_WORKERS}
      - ASYNC_MAX_BACKGROUND_TASKS=${ASYNC_MAX_BACKGROUND_TASKS}
      - ASYNC_CACHE_TTL_HOURS=${ASYNC_CACHE_TTL_HOURS}
      - AUTH_ENABLED=${AUTH_ENABLED}
      - AUTH_USERS=${AUTH_USERS}
      - AUTH_TOKEN_EXPIRY=${AUTH_TOKEN_EXPIRY}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET}
      # 如果需要代理，取消下面的注释并设置代理地址
      # - PROXY=socks5://proxy:7897
    volumes:
      - ${TRIM_PKGVAR}/pansou-cache:/app/cache
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${PAN_PORT}/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 如果需要代理，取消下面的注释
  # proxy:
  #   image: ghcr.io/snail007/goproxy:latest
  #   container_name: pansou-proxy
  #   restart: unless-stopped
  #   command: /proxy socks -p :7897
  #   networks:
  #     - pansou-network

  quark-auto-save:
    image: cp0204/quark-auto-save:latest
    container_name: quark-auto-save
    ports:
      - "${APP_PORT}:5005"
    restart: always
    environment:
      WEBUI_USERNAME: '${WEBUI_USERNAME}'
      WEBUI_PASSWORD: '${WEBUI_PASSWORD}'
      PLUGIN_FLAGS: '${PLUGIN_FLAGS}'
    volumes:
      - ${TRIM_PKGVAR}/quark-auto-save/config:/app/config
      - ${TRIM_PKGVAR}/quark-auto-save/media:/media

volumes:
  pansou-cache:
    name: pansou-cache
  quark-auto-save:
    name: quark-auto-save
