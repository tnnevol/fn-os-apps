
services:
    zentao:
        container_name: fn-zentao
        deploy:
            resources:
                limits:
                    cpus: ${CPUS}
                    memory: ${MEMORY_LIMIT}
        environment:
            - MYSQL_INTERNAL=true
        image: hub.zentao.net/app/zentao:22.1
        ports:
            - ${ZENTAO_HTTP_PORT}:80
        restart: always
        volumes:
            - ${TRIM_PKGVAR}/data:/data
