name: Build FPK & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# 统一版本管理：推送 v4.0.0 等 tag 时，构建所有应用
jobs:
  # 更新所有应用的 manifest 版本号和 README.md 中的版本信息
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump manifest and README versions
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          for dir in apps/*/; do
            app="${dir%/}"
            app="${app#apps/}"
            MANIFEST="apps/$app/manifest"
            if [ -f "$MANIFEST" ]; then
              OLD_VER=$(grep '^version' "$MANIFEST" | sed 's/.*= *//')
              sed -i "s/^version *= *.*/version               = $VERSION/" "$MANIFEST"
              echo "  $app: $OLD_VER → $VERSION"
            fi
          done

          # 更新 README.md 中的 Release 链接
          if [ -f "README.md" ]; then
            sed -i "s|releases/tag/[^)]*|releases/tag/${TAG}|" README.md
            # 更新 README.md 中的 Tag 示例
            sed -i "s|git tag v[0-9][0-9.]*|git tag ${TAG}|" README.md
            echo "  README.md: updated"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/*/manifest README.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump all app versions to ${{ github.ref_name }} [skip ci]"
            git checkout main
            git pull origin main
            git merge --ff-only FETCH_HEAD || git merge --no-edit FETCH_HEAD
            git push origin main
          else
            echo "No version changes to commit"
          fi

  # 动态发现 apps/ 目录下的所有应用
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      apps_space: ${{ steps.set-matrix.outputs.apps_space }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          APPS_JSON=""
          APPS_LIST=""
          for dir in apps/*/; do
            app="${dir%/}"
            app="${app#apps/}"
            APPS_JSON="${APPS_JSON}${APPS_JSON:+,}\"${app}\""
            APPS_LIST="${APPS_LIST}${APPS_LIST:+ }${app}"
          done
          echo "matrix=[${APPS_JSON}]" >> "$GITHUB_OUTPUT"
          echo "apps_space=${APPS_LIST}" >> "$GITHUB_OUTPUT"

  # 构建所有应用的 FPK 包
  build:
    needs: [bump-version, discover]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/fn-openlist-manager/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install fnpack
        run: |
          curl -fsSL https://static2.fnnas.com/fnpack/fnpack-1.2.1-linux-amd64 -o fnpack
          chmod +x fnpack
          sudo mv fnpack /usr/local/bin/fnpack

      - name: Verify fnpack
        run: fnpack --help

      - name: Override manifest version with tag
        working-directory: apps/${{ matrix.app }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version *= *.*/version               = $VERSION/" manifest
          echo "Override version to $VERSION"

      - name: Build Nuxt manager (fn-openlist only)
        if: matrix.app == 'fn-openlist'
        working-directory: apps/fn-openlist-manager
        run: |
          pnpm install
          pnpm build

      - name: Build FPK
        working-directory: apps/${{ matrix.app }}
        run: fnpack build

      - name: Rename FPK with version
        working-directory: apps/${{ matrix.app }}
        id: rename
        run: |
          APP="${{ matrix.app }}"
          VERSION="${{ github.ref_name }}"
          ORIGINAL_FPK=$(ls *.fpk 2>/dev/null | head -1)
          if [ -z "$ORIGINAL_FPK" ]; then
            echo "ERROR: No .fpk file generated"
            exit 1
          fi
          VERSIONED_FPK="${APP}-${VERSION}.fpk"
          mv "$ORIGINAL_FPK" "$VERSIONED_FPK"
          echo "fpk=$VERSIONED_FPK" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}
          path: apps/${{ matrix.app }}/*.fpk
          retention-days: 30

  # 创建 GitHub Release
  release:
    needs: [discover, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Generate release notes
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          # 获取上一个 tag
          PREV_TAG=$(git tag --sort=-version:refname | grep "^v" | awk -v tag="$TAG" 'found{print;exit} $0==tag{found=1}')

          printf '# 📦 fnOS Apps v%s\n\n| 应用 | 安装包 |\n|------|----------|\n' "$VERSION" > RELEASE_NOTES.md

          for APP in ${{ needs.discover.outputs.apps_space }}; do
            if [ -f "apps/$APP/manifest" ]; then
              DISPLAY_NAME=$(grep '^display_name' "apps/$APP/manifest" | sed 's/.*= *//')
            else
              DISPLAY_NAME="$APP"
            fi
            printf '| **%s** (`%s`) | %s-%s.fpk |\n' "$DISPLAY_NAME" "$APP" "$APP" "$TAG" >> RELEASE_NOTES.md
          done

          printf '\n## 🛠 安装方式\n\n1. 下载上方对应的 `.fpk` 安装包\n2. 打开飞牛 fnOS 应用中心\n3. 点击左下角 **手动安装** 按钮\n4. 选择下载好的 `.fpk` 文件完成安装\n' >> RELEASE_NOTES.md

          printf '\n## 📝 提交记录\n\n' >> RELEASE_NOTES.md
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:"- %s [%h](https://github.com/${{ github.repository }}/commit/%H)" "${PREV_TAG}..${TAG}" >> RELEASE_NOTES.md
          else
            git log --pretty=format:"- %s [%h](https://github.com/${{ github.repository }}/commit/%H)" --max-count=20 >> RELEASE_NOTES.md
          fi
          printf '\n' >> RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body_path: RELEASE_NOTES.md
          files: "**/*.fpk"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
